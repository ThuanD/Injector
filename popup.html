<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebCustom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0c0e14;
        --surface: #141720;
        --card: #1c2133;
        --card-hover: #212840;
        --border: rgba(255, 255, 255, 0.07);
        --accent: #3dd6f5;
        --accent2: #7c6cf8;
        --success: #2dd4a0;
        --warn: #f5a623;
        --danger: #ff5a71;
        --text: #dce3f0;
        --muted: #5a6480;
        --radius: 10px;
      }

      body {
        width: 380px;
        min-height: 200px;
        max-height: 580px;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        overflow: hidden;
      }

      /* HEADER */
      .header {
        padding: 14px 16px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
      }
      .header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          var(--accent),
          var(--accent2),
          transparent
        );
        opacity: 0.5;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .logo-text {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: var(--text);
      }
      .logo-text span {
        color: var(--accent);
      }
      .header-actions {
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        width: 28px;
        height: 28px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 7px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        transition: all 0.2s;
        color: var(--muted);
      }
      .icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(61, 214, 245, 0.07);
      }

      /* SITE PILL */
      .site-bar {
        margin: 10px 14px 0;
        padding: 7px 12px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .site-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--success);
        flex-shrink: 0;
        box-shadow: 0 0 6px var(--success);
        animation: pulse 2.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .site-url {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .site-url strong {
        color: var(--accent);
        font-weight: 500;
      }
      .script-count-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 7px;
        background: rgba(61, 214, 245, 0.12);
        color: var(--accent);
        border-radius: 10px;
        border: 1px solid rgba(61, 214, 245, 0.2);
        flex-shrink: 0;
      }

      /* TABS */
      .tabs {
        display: flex;
        margin: 10px 14px 0;
        gap: 4px;
        background: var(--surface);
        padding: 3px;
        border-radius: 9px;
        border: 1px solid var(--border);
      }
      .tab {
        flex: 1;
        padding: 6px;
        background: transparent;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        background: var(--card);
        color: var(--text);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }
      .tab-badge {
        font-size: 10px;
        background: var(--accent);
        color: var(--bg);
        border-radius: 6px;
        padding: 1px 5px;
        font-weight: 700;
        min-width: 16px;
        text-align: center;
      }

      /* PANEL */
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }

      /* SCRIPTS LIST */
      .scripts-list {
        max-height: 310px;
        overflow-y: auto;
        padding: 8px 14px;
      }
      .scripts-list::-webkit-scrollbar {
        width: 4px;
      }
      .scripts-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .scripts-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .empty-state {
        text-align: center;
        padding: 36px 20px;
        color: var(--muted);
      }
      .empty-state .empty-icon {
        font-size: 32px;
        margin-bottom: 10px;
        opacity: 0.5;
      }
      .empty-state p {
        font-size: 13px;
        line-height: 1.5;
      }
      .empty-state .empty-hint {
        font-size: 11px;
        margin-top: 6px;
        color: var(--accent);
        opacity: 0.7;
      }

      .script-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 13px;
        margin-bottom: 7px;
        transition: all 0.2s;
        animation: slideUp 0.2s ease both;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .script-card:hover {
        border-color: rgba(61, 214, 245, 0.25);
        background: var(--card-hover);
      }
      .script-card.disabled {
        opacity: 0.5;
      }

      .script-card-top {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .script-status {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
        flex-shrink: 0;
      }
      .script-status.off {
        background: var(--muted);
      }
      .script-name {
        flex: 1;
        font-weight: 600;
        font-size: 13px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .toggle-wrap {
        flex-shrink: 0;
      }
      .toggle {
        appearance: none;
        width: 32px;
        height: 18px;
        background: var(--muted);
        border-radius: 9px;
        position: relative;
        cursor: pointer;
        transition: background 0.25s;
      }
      .toggle::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        background: white;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: left 0.25s;
      }
      .toggle:checked {
        background: var(--success);
      }
      .toggle:checked::after {
        left: 16px;
      }

      .script-desc {
        font-size: 11.5px;
        color: var(--muted);
        margin-bottom: 8px;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .script-actions {
        display: flex;
        gap: 5px;
      }
      .action-btn {
        flex: 1;
        padding: 5px 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .action-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(61, 214, 245, 0.06);
      }
      .action-btn.run:hover {
        border-color: var(--success);
        color: var(--success);
        background: rgba(45, 212, 160, 0.06);
      }
      .action-btn.run-success {
        border-color: var(--success) !important;
        color: var(--success) !important;
        background: rgba(45, 212, 160, 0.1) !important;
      }

      /* HIDE ELEMENTS PANEL */
      .hide-panel {
        padding: 12px 14px;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .hide-enabled-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 12px;
        margin-bottom: 8px;
      }
      .hide-enabled-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .textarea-wrap {
        position: relative;
        margin-bottom: 8px;
      }
      .hide-textarea {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 12px;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        resize: none;
        height: 72px;
        transition: border-color 0.2s;
        outline: none;
        line-height: 1.6;
      }
      .hide-textarea:focus {
        border-color: rgba(61, 214, 245, 0.4);
      }
      .hide-textarea::placeholder {
        color: var(--muted);
      }
      .hide-hint {
        font-size: 10.5px;
        color: var(--muted);
        padding: 6px 10px;
        background: rgba(245, 166, 35, 0.07);
        border: 1px solid rgba(245, 166, 35, 0.15);
        border-radius: 6px;
        margin-bottom: 8px;
        line-height: 1.5;
      }
      .hide-hint code {
        font-family: "JetBrains Mono", monospace;
        color: var(--warn);
        font-size: 10px;
      }

      /* BOTTOM BAR */
      .bottom-bar {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 6px;
        background: var(--surface);
      }
      .bottom-btn {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .bottom-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(61, 214, 245, 0.05);
      }
      .bottom-btn.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-color: transparent;
        color: var(--bg);
      }
      .bottom-btn.primary:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
        z-index: 999;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.success {
        border-color: rgba(45, 212, 160, 0.4);
        color: var(--success);
      }
      .toast.error {
        border-color: rgba(255, 90, 113, 0.4);
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Web<span>Custom</span></div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="refreshBtn" title="Reload scripts">
          ↻
        </button>
        <button class="icon-btn" id="settingsBtn" title="Manage all scripts">
          ⚙
        </button>
      </div>
    </div>

    <div class="site-bar">
      <div class="site-dot"></div>
      <div class="site-url" id="siteUrl">Loading...</div>
      <div class="script-count-badge" id="scriptBadge">0 scripts</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="scripts">
        <span>⚡</span> Scripts
        <span class="tab-badge" id="tabCount">0</span>
      </button>
      <button class="tab" data-tab="hide"><span>🚫</span> Hide</button>
    </div>

    <!-- Scripts Panel -->
    <div class="panel active" id="panel-scripts">
      <div class="scripts-list" id="scriptsList">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <p>Scanning for scripts...</p>
        </div>
      </div>
    </div>

    <!-- Hide Panel -->
    <div class="panel" id="panel-hide">
      <div class="hide-panel">
        <div class="section-label">Hide Elements</div>

        <div class="hide-enabled-row">
          <div class="hide-enabled-label">🚫 Enable on this site</div>
          <label class="toggle-wrap">
            <input type="checkbox" class="toggle" id="hideToggle" />
          </label>
        </div>

        <div
          class="hint-text"
          style="font-size: 11px; color: var(--muted); margin-bottom: 7px"
        >
          CSS selectors, comma-separated:
        </div>
        <div class="textarea-wrap">
          <textarea
            class="hide-textarea"
            id="hideInput"
            placeholder=".ad-banner, #popup, [data-ad]"
          ></textarea>
        </div>
        <div class="hide-hint">
          Supports: <code>.class</code> · <code>#id</code> ·
          <code>[attr]</code> · <code>tag</code><br />
          Example: <code>.sidebar-ads, #cookie-banner, .promo</code>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="bottom-btn" id="saveHideBtn" style="display: none">
        💾 Save & Reload
      </button>
      <button class="bottom-btn primary" id="manageBtn">
        ⚙ Manage All Scripts
      </button>
      <button class="bottom-btn" id="addBtn" title="Add new script">
        ＋ Add
      </button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="popup.js"></script>
  </body>
</html>
