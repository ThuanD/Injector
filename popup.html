<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Customizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --bg-light: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            width: 420px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 16px 20px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .current-site {
            background: var(--bg-light);
            border: 1px solid var(--border);
            padding: 12px 16px;
            margin: 12px;
            border-radius: var(--radius);
            font-size: 13px;
            word-break: break-all;
            color: var(--text-light);
        }

        .scripts-container {
            max-height: 350px;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .script-item {
            background: var(--bg-light);
            border: 1px solid var(--border);
            padding: 12px;
            margin: 8px 0;
            border-radius: var(--radius);
            transition: all 0.2s;
        }

        .script-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .script-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .script-toggle {
            width: 36px;
            height: 20px;
            background: var(--border);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .script-toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .script-toggle.enabled {
            background: var(--success);
        }

        .script-toggle.enabled::after {
            left: 18px;
        }

        .script-desc {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .script-actions {
            display: flex;
            gap: 6px;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .no-scripts {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        .manage-btn {
            width: calc(100% - 24px);
            margin: 12px;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 600;
            border-radius: var(--radius);
        }

        .manage-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>
            <span class="header-badge"></span>
            Web Customizer
        </h1>
    </div>

    <div class="current-site" id="currentSite">Loading...</div>

    <div class="scripts-container">
        <div id="scriptsList" class="no-scripts">Searching for scripts...</div>
    </div>

    <button id="manageScripts" class="manage-btn">⚙️ Manage All Scripts</button>

    <script src="popup.js"></script>
</body>

</html>
