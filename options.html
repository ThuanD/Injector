<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Customizer - Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --bg-light: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--bg-light);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .script-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s;
        }

        .script-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .script-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .script-card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .script-card-pattern {
            font-size: 12px;
            color: var(--text-light);
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .script-card-desc {
            font-size: 13px;
            color: var(--text-light);
            margin: 12px 0;
            line-height: 1.5;
        }

        .script-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .script-card-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
            border: none;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .no-scripts {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .no-scripts h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px rgba(0,0,0,0.15);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
            font-family: 'Courier New', monospace;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-actions .btn-primary {
            background: var(--primary);
            color: white;
        }

        .modal-actions .btn-primary:hover {
            background: var(--primary-dark);
        }

        .modal-actions button:last-child {
            background: var(--border);
            color: var(--text);
        }

        .modal-actions button:last-child:hover {
            background: #cbd5e1;
        }

        .pattern-help {
            font-size: 12px;
            color: var(--text-light);
            background: #fef3c7;
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
            border-left: 3px solid var(--warning);
        }

        .pattern-help strong {
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .scripts-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 12px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 4px;
        }

        .template-card {
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .template-card-category {
            font-size: 11px;
            color: white;
            background: var(--primary);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .template-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .template-card-desc {
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Web Customizer</h1>
            <p>Manage your custom scripts for different websites</p>
        </div>

        <div class="toolbar">
            <input type="text" id="searchBox" class="search-box" placeholder="Search scripts...">
            <button id="addScript" class="btn btn-primary">+ Add New Script</button>
            <button id="addFromTemplate" class="btn btn-primary" style="background: #8b5cf6;">📋 Use Template</button>
            <button id="exportScripts" class="btn btn-secondary">↓ Export</button>
            <button id="importScripts" class="btn btn-secondary">↑ Import</button>
        </div>

        <div id="scriptsList" class="scripts-grid"></div>
    </div>

    <script src="templates.js"></script>
    <script src="options.js"></script>
</body>
</html>
